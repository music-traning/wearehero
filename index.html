<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WE ARE HERO</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="theme-color" content="#0f0f0f">

    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #e0e0e0;
            --border-color: #ffffff;
            --accent-color: #4CAF50;
            --danger-color: #f44336;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'DotGothic16', monospace;
            margin: 0;
            padding: 10px;
            user-select: none;
        }
        #app-container {
            max-width: 600px;
            margin: 0 auto;
            border: 4px solid var(--border-color);
            padding: 20px;
            background-color: #000;
            box-shadow: 4px 4px 0px #555;
        }
        h1, h2, h3 { text-align: center; margin-top: 0; }
        .btn {
            background-color: #000;
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 10px 15px;
            font-family: 'DotGothic16', monospace;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            font-size: 16px;
            box-shadow: 2px 2px 0px var(--border-color);
            text-align: center;
        }
        .btn:active { transform: translate(2px, 2px); box-shadow: none; }
        .btn-danger { border-color: var(--danger-color); color: var(--danger-color); }
        
        select.btn {
            appearance: none;
            -webkit-appearance: none;
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8s-1.9-9.3-5.5-12.8z%22/%3E%3C/svg%3E');
            background-repeat: no-repeat;
            background-position: right 10px top 50%;
            background-size: 12px auto;
            padding-right: 30px;
        }

        .question-card { border: 1px dashed #777; padding: 15px; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .option-btn { background: #111; color: #fff; border: 1px solid #444; padding: 12px; text-align: left; font-family: inherit; }
        .option-btn.selected { background: var(--accent-color); border-color: #fff; }

        .stat-row { display: flex; align-items: center; margin-bottom: 5px; }
        .stat-label { width: 40px; font-weight: bold; }
        .stat-bar-container { flex-grow: 1; border: 2px solid #fff; height: 16px; background: #222; padding: 1px; }
        .stat-bar { height: 100%; background: var(--accent-color); transition: width 0.3s; }

        .history-item { border-bottom: 1px solid #444; padding: 10px 0; font-size: 14px; }
        .affinity-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dotted #555; padding: 6px 0; }
        .affinity-item:last-child { border-bottom: none; }
        .affinity-type { font-weight: bold; width: 45px; }
        .affinity-title { flex-grow: 1; padding-left: 10px; }
        .affinity-score-box { text-align: right; }
        .affinity-relation { font-size: 10px; color: var(--accent-color); display: block; }
        
        /* 最重要：これを消すとUIが全崩壊します */
        .hidden { display: none !important; }
        
        .header-controls { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; }

        /* フッターのスタイル */
        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 15px;
            border-top: 1px dashed #444;
            font-size: 12px;
        }
        footer a {
            color: var(--text-color);
            text-decoration: none;
        }
        footer a:hover {
            color: var(--accent-color);
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header-controls">
        <button id="lang-toggle" style="background:#000; color:#fff; border:1px solid #fff; padding:5px 10px; font-family: inherit; cursor:pointer;">[EN/JA]</button>
        <button id="btn-help" onclick="showHelp()" style="background:#000; color:#fff; border:1px solid #fff; padding:5px 10px; font-family: inherit; cursor:pointer;">[ ? ] HELP</button>
    </div>

    <div id="screen-home">
        <h1 id="ui-title">WE ARE HERO</h1>
        <p id="ui-desc" style="text-align:center; font-size:14px; margin-bottom:30px;">心理的資本(HERO)に基づくステータス診断</p>
        <button class="btn" onclick="startQuiz(1)" id="btn-tier1">軽く (12問)</button>
        <button class="btn" onclick="startQuiz(2)" id="btn-tier2">普通に (28問)</button>
        <button class="btn" onclick="startQuiz(3)" id="btn-tier3">深く (48問)</button>
        
        <div style="margin-top: 40px; border-top: 1px dashed #777; padding-top: 20px;">
            <h3 id="ui-quick-affinity-title">簡易相性チェック</h3>
            <p id="ui-quick-affinity-desc" style="font-size: 12px; text-align: center; color: #aaa; margin-bottom: 15px;">2つのタイプを選んで相性をシミュレーション</p>
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
                <select id="affinity-type-a" class="btn" style="width: 45%; margin-bottom: 0; font-size: 14px;"></select>
                <span style="font-weight: bold;">×</span>
                <select id="affinity-type-b" class="btn" style="width: 45%; margin-bottom: 0; font-size: 14px;"></select>
            </div>
            <button class="btn" onclick="checkQuickAffinity()" id="btn-check-affinity">相性を見る</button>
            <div id="quick-affinity-result" style="margin-top: 10px; border: 1px solid var(--accent-color); padding: 15px; background: #0a120a;" class="hidden">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <strong id="quick-result-relation" style="color: var(--accent-color); font-size: 18px;"></strong>
                    <span id="quick-result-score" style="font-size: 24px; font-weight: bold;"></span>
                </div>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <h3 id="ui-history-title">診断履歴</h3>
            <div id="history-list"></div>
            <button class="btn btn-danger hidden" id="btn-clear-history" onclick="clearHistory()">履歴を削除</button>
        </div>
    </div>

    <div id="screen-quiz" class="hidden">
        <h3 id="quiz-progress"></h3>
        <div class="question-card" id="question-text"></div>
        <div class="options" id="quiz-options"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn" onclick="prevQuestion()" id="btn-prev" style="width:30%;">戻る</button>
            <button class="btn" onclick="nextQuestion()" id="btn-next" style="width:70%;">次へ</button>
        </div>
    </div>

    <div id="screen-result" class="hidden">
        <h2 id="result-type"></h2>
        <h3 id="result-title"></h3>
        <div style="text-align: center; margin: 20px 0;">
            <div style="width: 100px; height: 100px; border: 2px solid #fff; display: inline-block; line-height:100px; color:#555;">[IMG]</div>
        </div>
        <div style="margin-bottom: 20px;">
            <div class="stat-row"><div class="stat-label">H</div><div class="stat-bar-container"><div id="bar-h" class="stat-bar"></div></div></div>
            <div class="stat-row"><div class="stat-label">E</div><div class="stat-bar-container"><div id="bar-e" class="stat-bar"></div></div></div>
            <div class="stat-row"><div class="stat-label">R</div><div class="stat-bar-container"><div id="bar-r" class="stat-bar"></div></div></div>
            <div class="stat-row"><div class="stat-label">O</div><div class="stat-bar-container"><div id="bar-o" class="stat-bar"></div></div></div>
        </div>
        <p id="result-profile" style="font-size: 14px; line-height: 1.6;"></p>
        <div style="border:1px solid #fff; padding:10px; margin-top:20px;">
            <strong id="ui-action-plan"></strong><br><span id="result-action"></span>
        </div>
        <div style="border:1px dashed #fff; padding:10px; margin-top:20px;">
            <strong id="ui-affinity"></strong>
            <div id="affinity-list" style="margin-top: 15px; font-size: 12px;"></div>
        </div>
        <button class="btn" onclick="goHome()" style="margin-top: 30px;" id="btn-home">ホームに戻る</button>
    </div>

    <div id="screen-help" class="hidden">
        <h2 id="ui-help-title"></h2>
        <p id="ui-help-desc" style="font-size: 12px; text-align: center; color: #aaa;"></p>
        <div id="help-list" style="margin-top: 20px; max-height: 400px; overflow-y: auto; border: 1px solid #444; padding: 15px; background: #111;"></div>
        <button class="btn" onclick="closeHelp()" style="margin-top: 20px;" id="btn-close-help">閉じる</button>
    </div>

    <footer>
        <a href="https://note.com/jazzy_begin" target="_blank" rel="noopener noreferrer">©2026 buro</a>
    </footer>
    
</div>

<script>
    // =========================================================================
    // ここに Step 1 の完全なJSONデータをペーストして上書きしてください。
    // （※以下はテスト動作確認用の仮データです。必ず差し替えてください）
    // =========================================================================
    const heroData = {
  "app_config": {
    "title": {
      "ja": "WE ARE HERO",
      "en": "WE ARE HERO"
    },
    "description": {
      "ja": "心理的資本（HERO）に基づくレジリエンス・ステータス診断",
      "en": "Resilience Status Assessment based on Psychological Capital (HERO)"
    },
    "scale": [
      { "value": 1, "label": { "ja": "全く当てはまらない", "en": "Strongly Disagree" } },
      { "value": 2, "label": { "ja": "あまり当てはまらない", "en": "Disagree" } },
      { "value": 3, "label": { "ja": "どちらともいえない", "en": "Neutral" } },
      { "value": 4, "label": { "ja": "やや当てはまる", "en": "Agree" } },
      { "value": 5, "label": { "ja": "非常に当てはまる", "en": "Strongly Agree" } }
    ]
  },
  "questions": [
    
    { "id": "q01", "category": "H", "tier": 1, "is_reversed": false, "text": { "ja": "目標への道が絶たれても、即座に「プランB」の構築に取り掛かることができる。", "en": "Even if the path to my goal is cut off, I can immediately start building 'Plan B'." } },
    { "id": "q02", "category": "H", "tier": 1, "is_reversed": true, "text": { "ja": "現在のプロジェクトにおいて、自分がどこに向かっているのか分からなくなることが多い。", "en": "In my current projects, I often lose sight of where I am heading." } },
    { "id": "q03", "category": "H", "tier": 1, "is_reversed": false, "text": { "ja": "ゴールが遠くても、今この瞬間の泥臭い作業がそこへ繋がっていると実感できる。", "en": "Even if the goal is distant, I feel that my current gritty tasks are connected to it." } },
    { "id": "q04", "category": "E", "tier": 1, "is_reversed": false, "text": { "ja": "未経験のタスクを任されても、「最終的には自分がなんとかする」という確信がある。", "en": "When assigned an unexperienced task, I am confident that 'I will manage it in the end'." } },
    { "id": "q05", "category": "E", "tier": 1, "is_reversed": true, "text": { "ja": "自分の能力を超える課題に直面すると、立ちすくんでしまう。", "en": "I freeze when faced with challenges that exceed my capabilities." } },
    { "id": "q06", "category": "E", "tier": 1, "is_reversed": false, "text": { "ja": "過去の成功体験が、今の新しい挑戦の支えになっている。", "en": "Past successful experiences support my current new challenges." } },
    { "id": "q07", "category": "R", "tier": 1, "is_reversed": false, "text": { "ja": "理不尽なトラブルで計画が崩壊しても、翌日には平常心のルーティンに戻ることができる。", "en": "Even if unreasonable troubles destroy my plans, I can return to my normal routine the next day." } },
    { "id": "q08", "category": "R", "tier": 1, "is_reversed": true, "text": { "ja": "一度の大きな失敗を引きずり、数日間パフォーマンスが落ちることがある。", "en": "I sometimes drag out a major failure, causing my performance to drop for days." } },
    { "id": "q09", "category": "R", "tier": 1, "is_reversed": false, "text": { "ja": "強いストレスを感じた時、それを断ち切るための「自分なりの儀式（行動）」を持っている。", "en": "When feeling extreme stress, I have my own 'ritual' to break it off." } },
    { "id": "q10", "category": "O", "tier": 1, "is_reversed": false, "text": { "ja": "仕事での失敗は、自分の能力不足というより「一時的な環境や運の要素」が強かったと切り替えられる。", "en": "I can shift my mindset to view work failures as 'temporary environmental or luck factors' rather than a lack of ability." } },
    { "id": "q11", "category": "O", "tier": 1, "is_reversed": true, "text": { "ja": "ひとつのミスが、今後のキャリアすべてを台無しにするような恐怖を感じる。", "en": "I fear that a single mistake will ruin my entire career." } },
    { "id": "q12", "category": "O", "tier": 1, "is_reversed": false, "text": { "ja": "今の苦境は長くは続かず、やがて潮目が変わると信じている。", "en": "I believe the current hardship won't last long and the tide will eventually turn." } },
    
    { "id": "q13", "category": "H", "tier": 2, "is_reversed": false, "text": { "ja": "複数のアプローチを同時に走らせ、どれかが失敗してもダメージを最小限に抑える準備をしている。", "en": "I run multiple approaches simultaneously to minimize damage if one fails." } },
    { "id": "q14", "category": "H", "tier": 2, "is_reversed": true, "text": { "ja": "ゴールまでの道筋は一つしかなく、それが塞がれたら終わりだと感じる。", "en": "I feel there is only one path to the goal, and if it's blocked, it's over." } },
    { "id": "q15", "category": "H", "tier": 2, "is_reversed": false, "text": { "ja": "周囲が諦めるような状況でも、突破口を見つけるための議論を主導できる。", "en": "Even when others give up, I can lead discussions to find a breakthrough." } },
    { "id": "q16", "category": "H", "tier": 2, "is_reversed": false, "text": { "ja": "目標自体が途中で変わっても、モチベーションを落とさずに再設定できる。", "en": "If the goal itself changes mid-way, I can reset without losing motivation." } },
    { "id": "q17", "category": "E", "tier": 2, "is_reversed": false, "text": { "ja": "誰もやりたがらない地味な仕事でも、自分がやれば価値を生み出せると思う。", "en": "Even in tedious jobs no one wants, I believe I can create value." } },
    { "id": "q18", "category": "E", "tier": 2, "is_reversed": true, "text": { "ja": "専門外の話題について意見を求められると、極度に萎縮してしまう。", "en": "I shrink back extremely when asked for opinions outside my expertise." } },
    { "id": "q19", "category": "E", "tier": 2, "is_reversed": false, "text": { "ja": "周囲の評価がどうであれ、自分の生み出した成果物には絶対の自信を持っている。", "en": "Regardless of others' evaluations, I have absolute confidence in the output I create." } },
    { "id": "q20", "category": "E", "tier": 2, "is_reversed": false, "text": { "ja": "失敗するかもしれない恐怖よりも、自分の仮説を証明したい欲求が勝る。", "en": "The desire to prove my hypothesis outweighs the fear of potential failure." } },
    { "id": "q21", "category": "R", "tier": 2, "is_reversed": false, "text": { "ja": "長期にわたる単調で遅効性のタスクを、淡々と継続できる。", "en": "I can stoically continue long-term, monotonous, slow-yielding tasks." } },
    { "id": "q22", "category": "R", "tier": 2, "is_reversed": true, "text": { "ja": "批判的なフィードバックを受けると、人格まで否定されたように感じてしまう。", "en": "I feel my entire character is denied when I receive critical feedback." } },
    { "id": "q23", "category": "R", "tier": 2, "is_reversed": false, "text": { "ja": "納得のいかないルールや理不尽な環境下でも、感情を殺して実利を取る立ち回りができる。", "en": "Even under unacceptable rules, I can kill my emotions and maneuver for practical gains." } },
    { "id": "q24", "category": "R", "tier": 2, "is_reversed": false, "text": { "ja": "燃え尽き症候群の兆候を自分で察知し、意図的に休むことができる。", "en": "I can detect signs of burnout myself and intentionally take a rest." } },
    { "id": "q25", "category": "O", "tier": 2, "is_reversed": false, "text": { "ja": "自分の努力が評価されなかった時、「相手の見る目がないだけだ」と笑って流すことができる。", "en": "When my efforts go unrewarded, I can laugh it off thinking 'They just lack the eye for it'." } },
    { "id": "q26", "category": "O", "tier": 2, "is_reversed": true, "text": { "ja": "トラブルが起きた際、解決よりも先に「誰のせいか」を気にしてしまう。", "en": "When trouble occurs, I worry about 'whose fault it is' before finding a solution." } },
    { "id": "q27", "category": "O", "tier": 2, "is_reversed": false, "text": { "ja": "不確実な要素が多いプロジェクトほど、面白い化学反応が起きるとワクワクする。", "en": "The more uncertain a project is, the more excited I get about interesting chemical reactions." } },
    { "id": "q28", "category": "O", "tier": 2, "is_reversed": true, "text": { "ja": "悪い予測が当たった時、「やはりダメだったか」と妙に安堵してしまう自分がいる。", "en": "When a bad prediction comes true, a part of me feels oddly relieved thinking 'I knew it wouldn't work'." } },
    
    { "id": "q29", "category": "H", "tier": 3, "is_reversed": false, "text": { "ja": "巨大な目標を、今日一日の具体的なスモールタスクにまで分解する解像度を持っている。", "en": "I have the resolution to break down massive goals into concrete small tasks for today." } },
    { "id": "q30", "category": "H", "tier": 3, "is_reversed": true, "text": { "ja": "他人の成功を見ると、自分の選んだ道が間違っているのではないかと激しく焦る。", "en": "Seeing others' success makes me severely anxious that I chose the wrong path." } },
    { "id": "q31", "category": "H", "tier": 3, "is_reversed": false, "text": { "ja": "資源が枯渇していても、別のところから引っ張ってくる「悪知恵」が働く。", "en": "Even when resources are depleted, my 'cunning' kicks in to pull them from elsewhere." } },
    { "id": "q32", "category": "H", "tier": 3, "is_reversed": true, "text": { "ja": "「なぜそれをやるのか」という根本的な意義を見失い、突然手が止まることがある。", "en": "I sometimes suddenly stop working, losing sight of the fundamental 'why' behind it." } },
    { "id": "q33", "category": "H", "tier": 3, "is_reversed": false, "text": { "ja": "絶対に勝てない戦いであっても、撤退戦を指揮して被害を最小化する戦略を描ける。", "en": "Even in an unwinnable battle, I can draw a strategy to lead a retreat and minimize damage." } },
    { "id": "q34", "category": "E", "tier": 3, "is_reversed": true, "text": { "ja": "自分の代わりはいくらでもいると、心の底で冷めている。", "en": "Deep down, I am coldly aware that I am completely replaceable." } },
    { "id": "q35", "category": "E", "tier": 3, "is_reversed": false, "text": { "ja": "ツールや環境が劣悪でも、自分の腕前だけで一定のクオリティを叩き出せる。", "en": "Even with poor tools or environments, I can deliver a certain quality using just my skills." } },
    { "id": "q36", "category": "E", "tier": 3, "is_reversed": true, "text": { "ja": "自分より圧倒的に優秀な人間を前にすると、戦う前から諦めてしまう。", "en": "Faced with an overwhelmingly superior person, I give up before the fight starts." } },
    { "id": "q37", "category": "E", "tier": 3, "is_reversed": false, "text": { "ja": "権威ある人間の意見でも、論理がおかしければ臆せず反論できる。", "en": "Even against authority, I can fearlessly object if their logic is flawed." } },
    { "id": "q38", "category": "E", "tier": 3, "is_reversed": false, "text": { "ja": "自分の価値は「何ができるか」ではなく、「何を成し遂げたか」でのみ証明されると思う。", "en": "I believe my value is proven only by 'what I have accomplished', not 'what I can do'." } },
    { "id": "q39", "category": "R", "tier": 3, "is_reversed": false, "text": { "ja": "毎日の生活において、感情の起伏とは無関係に「絶対にやる」と決めている習慣がある。", "en": "In my daily life, I have a habit I 'absolutely do' regardless of my emotional ups and downs." } },
    { "id": "q40", "category": "R", "tier": 3, "is_reversed": true, "text": { "ja": "予期せぬトラブルが起きた時、心臓の鼓動が早くなり、冷静な判断ができなくなる。", "en": "When unexpected trouble occurs, my heart races and I lose calm judgment." } },
    { "id": "q41", "category": "R", "tier": 3, "is_reversed": true, "text": { "ja": "過去の失敗の記憶が突然フラッシュバックして、身動きがとれなくなることがある。", "en": "Memories of past failures sometimes suddenly flash back, paralyzing me." } },

        }
        for (const [key, data] of Object.entries(heroData.types)) {
            const text = `[${key}] ${data.title[currentLang]}`;
            selectA.add(new Option(text, key)); selectB.add(new Option(text, key));
        }
    }

    function startQuiz(tier) {
        currentTier = tier; currentQuestions = heroData.questions.filter(q => q.tier <= tier); currentIdx = 0; answers = {};
        document.getElementById('screen-home').classList.add('hidden'); document.getElementById('screen-quiz').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        const q = currentQuestions[currentIdx];
        document.getElementById('quiz-progress').innerText = `Q. ${currentIdx + 1} / ${currentQuestions.length}`;
        document.getElementById('question-text').innerText = q.text[currentLang];
        const optionsContainer = document.getElementById('quiz-options'); optionsContainer.innerHTML = '';
        heroData.app_config.scale.forEach(scale => {
            const btn = document.createElement('button'); btn.className = 'option-btn';
            if(answers[q.id] === scale.value) btn.classList.add('selected');
            btn.innerText = scale.label[currentLang];
            btn.onclick = () => { answers[q.id] = scale.value; renderQuestion(); };
            optionsContainer.appendChild(btn);
        });
        document.getElementById('btn-prev').disabled = currentIdx === 0;
        document.getElementById('btn-next').innerText = currentIdx === currentQuestions.length - 1 ? (currentLang === 'ja' ? "結果を見る" : "See Result") : (currentLang === 'ja' ? "次へ" : "Next");
    }

    function prevQuestion() { if(currentIdx > 0) { currentIdx--; renderQuestion(); } }
    function nextQuestion() {
        if(!answers[currentQuestions[currentIdx].id]) return alert(currentLang === 'ja' ? '回答を選択してください' : 'Please select an option');
        if(currentIdx < currentQuestions.length - 1) { currentIdx++; renderQuestion(); } else { calculateResult(); }
    }

    function calculateResult() {
        let scores = { H: 0, E: 0, R: 0, O: 0 }, counts = { H: 0, E: 0, R: 0, O: 0 };
        currentQuestions.forEach(q => { let val = answers[q.id]; if(q.is_reversed) val = 6 - val; scores[q.category] += val; counts[q.category] += 1; });
        let typeStr = "", percentages = {};
        ['H', 'E', 'R', 'O'].forEach(cat => { let avg = scores[cat] / counts[cat]; typeStr += avg >= 3.0 ? "H" : "L"; percentages[cat] = ((avg - 1) / 4) * 100; });
        const resultData = heroData.types[typeStr] || heroData.types[Object.keys(heroData.types)[0]];
        showResult(typeStr, resultData, percentages); saveHistory(typeStr, resultData.title[currentLang]);
    }

    function calculateAffinityDetails(typeA, typeB) {
        let diff = 0; for (let i = 0; i < 4; i++) { if (typeA[i] !== typeB[i]) diff++; }
        switch(diff) {
            case 4: return { score: 120, relation: currentLang === 'ja' ? "究極の補完者" : "Ultimate Complement" };
            case 1: return { score: 90,  relation: currentLang === 'ja' ? "最良の戦友" : "Best Comrade" };
            case 0: return { score: 80,  relation: currentLang === 'ja' ? "鏡面の同志" : "Mirror Comrade" };
            case 2: return { score: 60,  relation: currentLang === 'ja' ? "平行線の協力者" : "Parallel Collaborator" };
            case 3: return { score: 40,  relation: currentLang === 'ja' ? "異端の摩擦者" : "Unorthodox Friction" };
        }
    }

    function showResult(typeKey, data, percentages) {
        document.getElementById('screen-quiz').classList.add('hidden'); document.getElementById('screen-result').classList.remove('hidden');
        document.getElementById('result-type').innerText = `[ ${typeKey} ]`; document.getElementById('result-title').innerText = data.title[currentLang];
        document.getElementById('result-profile').innerText = data.profile[currentLang]; document.getElementById('result-action').innerText = data.action_plan[currentLang];
        document.getElementById('ui-action-plan').innerText = currentLang === 'ja' ? "【行動指針】" : "[ Action Plan ]";
        document.getElementById('ui-affinity').innerText = currentLang === 'ja' ? "【全16タイプ 相性マトリックス】" : "[ 16-Type Affinity Matrix ]";
        document.getElementById('screen-result').classList.remove('hidden');

        const imgContainer = document.querySelector('#screen-result div[style*="text-align: center"]');
        imgContainer.innerHTML = `<img src="assets/icons/${typeKey}.png" alt="${typeKey}" style="width:100px; height:100px; image-rendering: pixelated;">`;

        ['h', 'e', 'r', 'o'].forEach(cat => { document.getElementById(`bar-${cat}`).style.width = `${percentages[cat.toUpperCase()]}%`; });
        const affinityListDiv = document.getElementById('affinity-list'); affinityListDiv.innerHTML = '';
        let affinityResults = [];
        for (const [targetType, targetData] of Object.entries(heroData.types)) {
            const affData = calculateAffinityDetails(typeKey, targetType);
            affinityResults.push({ type: targetType, title: targetData.title[currentLang], score: affData.score, relation: affData.relation });
        }
        affinityResults.sort((a, b) => b.score - a.score).forEach(item => {
            const div = document.createElement('div'); div.className = 'affinity-item';
            div.innerHTML = `<div class="affinity-type">[${item.type}]</div><div class="affinity-title">${item.title}</div><div class="affinity-score-box"><span class="affinity-relation">${item.relation}</span><strong>${item.score}%</strong></div>`;
            affinityListDiv.appendChild(div);
        });
    }

    function checkQuickAffinity() {
        const typeA = document.getElementById('affinity-type-a').value, typeB = document.getElementById('affinity-type-b').value;
        const resultData = calculateAffinityDetails(typeA, typeB);
        document.getElementById('quick-result-relation').innerText = resultData.relation; document.getElementById('quick-result-score').innerText = `${resultData.score}%`;
        document.getElementById('quick-affinity-result').classList.remove('hidden');
    }

    function goHome() { document.getElementById('screen-result').classList.add('hidden'); document.getElementById('screen-home').classList.remove('hidden'); renderHomeUI(); }

    function showHelp() {
        document.querySelectorAll('#app-container > div:not(.header-controls)').forEach(div => div.classList.add('hidden'));
        document.getElementById('screen-help').classList.remove('hidden');
        document.getElementById('ui-help-title').innerText = currentLang === 'ja' ? "16タイプ図鑑" : "16 Types Encyclopedia";
        document.getElementById('ui-help-desc').innerText = currentLang === 'ja' ? "心理的資本(HERO)の組み合わせによる全クラス一覧" : "All classes based on HERO combinations";
        document.getElementById('btn-close-help').innerText = currentLang === 'ja' ? "閉じる" : "Close";
        const helpList = document.getElementById('help-list'); helpList.innerHTML = '';
        for (const [key, data] of Object.entries(heroData.types)) {
            const div = document.createElement('div'); div.style.borderBottom = "1px dashed #555"; div.style.paddingBottom = "15px"; div.style.marginBottom = "15px";
            div.innerHTML = `<div style="color: var(--accent-color); font-size: 16px; font-weight: bold; margin-bottom: 5px;">[${key}] ${data.title[currentLang]}</div><div style="font-size: 13px; line-height: 1.5; color: #ccc;">${data.profile[currentLang]}</div>`;
            helpList.appendChild(div);
        }
    }

    function closeHelp() { document.getElementById('screen-help').classList.add('hidden'); document.getElementById('screen-home').classList.remove('hidden'); renderHomeUI(); }

    function saveHistory(typeKey, title) {
        let history = JSON.parse(localStorage.getItem('hero_history')) || []; const date = new Date();
        const dateStr = `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
        history.unshift({ date: dateStr, type: typeKey, title: title, tier: currentTier }); localStorage.setItem('hero_history', JSON.stringify(history));
    }

    function loadHistory() {
        const historyList = document.getElementById('history-list'), clearBtn = document.getElementById('btn-clear-history');
        let history = JSON.parse(localStorage.getItem('hero_history')) || []; historyList.innerHTML = '';
        if(history.length === 0) { historyList.innerHTML = `<p style="color:#555; font-size:14px;">${currentLang === 'ja' ? '履歴はありません' : 'No history yet'}</p>`; clearBtn.classList.add('hidden'); return; }
        clearBtn.classList.remove('hidden');
        history.forEach(item => { const div = document.createElement('div'); div.className = 'history-item'; div.innerText = `[${item.date}] Tier${item.tier} : [${item.type}] ${item.title}`; historyList.appendChild(div); });
    }

    function clearHistory() { if(confirm(currentLang === 'ja' ? '本当に履歴を削除しますか？' : 'Are you sure to clear history?')) { localStorage.removeItem('hero_history'); loadHistory(); } }

    renderHomeUI();

    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./service-worker.js').catch(err => console.log('SW error: ', err)); }); }
</script>
</body>
</html>
