    <style>
        :root {
            --bg-color: #0f0f0f;

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'DotGothic16', monospace;
            margin: 0;
            padding: 10px;
            user-select: none;
        }
        #app-container {
            max-width: 600px;
            margin: 0 auto;
            border: 4px solid var(--border-color);
            padding: 20px;
            background-color: #000;
            box-shadow: 4px 4px 0px #555;

        h1, h2, h3 { text-align: center; margin-top: 0; }
        .btn {
            background-color: #000;
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 10px 15px;
            font-family: 'DotGothic16', monospace;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            font-size: 16px;
            box-shadow: 2px 2px 0px var(--border-color);

        .btn:active { transform: translate(2px, 2px); box-shadow: none; }
        .btn-danger { border-color: var(--danger-color); color: var(--danger-color); }
        
        select.btn {
            appearance: none;
            -webkit-appearance: none;
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8s-1.9-9.3-5.5-12.8z%22/%3E%3C/svg%3E');
            background-repeat: no-repeat;
            background-position: right 10px top 50%;
            background-size: 12px auto;
            padding-right: 30px;
        }

        .question-card { border: 1px dashed #777; padding: 15px; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .option-btn { background: #111; color: #fff; border: 1px solid #444; padding: 12px; text-align: left; font-family: inherit; }
        .option-btn.selected { background: var(--accent-color); border-color: #fff; }

        .stat-row { display: flex; align-items: center; margin-bottom: 5px; }
        .stat-label { width: 40px; font-weight: bold; }
        .stat-bar-container { flex-grow: 1; border: 2px solid #fff; height: 16px; background: #222; padding: 1px; }
        .stat-bar { height: 100%; background: var(--accent-color); transition: width 0.3s; }

        .history-item { border-bottom: 1px solid #444; padding: 10px 0; font-size: 14px; }
        .affinity-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dotted #555; padding: 6px 0; }
        .affinity-item:last-child { border-bottom: none; }
        .affinity-type { font-weight: bold; width: 45px; }
        .affinity-title { flex-grow: 1; padding-left: 10px; }
        .affinity-score-box { text-align: right; }
        .affinity-relation { font-size: 10px; color: var(--accent-color); display: block; }
        
        .hidden { display: none !important; }
        
        .header-controls { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; }

        footer {

            color: var(--text-color);
            text-decoration: none;
        }
        footer a:hover {
            color: var(--accent-color);
            text-decoration: underline;
        }

<body>

<div id="app-container">
    <div class="header-controls">
        <button id="lang-toggle" style="background:#000; color:#fff; border:1px solid #fff; padding:5px 10px; font-family: inherit; cursor:pointer;">[EN/JA]</button>

    </div>

    <div id="screen-home">
        <h1 id="ui-title">WE ARE HERO</h1>
        <p id="ui-desc" style="text-align:center; font-size:14px; margin-bottom:30px;">心理的資本(HERO)に基づくステータス診断</p>
        <button class="btn" onclick="startQuiz(1)" id="btn-tier1">軽く (12問)</button>
        <button class="btn" onclick="startQuiz(2)" id="btn-tier2">普通に (28問)</button>
        <button class="btn" onclick="startQuiz(3)" id="btn-tier3">深く (48問)</button>
        
        <div style="margin-top: 40px; border-top: 1px dashed #777; padding-top: 20px;">
            <h3 id="ui-quick-affinity-title">簡易相性チェック</h3>
            <p id="ui-quick-affinity-desc" style="font-size: 12px; text-align: center; color: #aaa; margin-bottom: 15px;">2つのタイプを選んで相性をシミュレーション</p>
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
                <select id="affinity-type-a" class="btn" style="width: 45%; margin-bottom: 0; font-size: 14px;"></select>
                <span style="font-weight: bold;">×</span>
                <select id="affinity-type-b" class="btn" style="width: 45%; margin-bottom: 0; font-size: 14px;"></select>
            </div>
            <button class="btn" onclick="checkQuickAffinity()" id="btn-check-affinity">相性を見る</button>
            <div id="quick-affinity-result" style="margin-top: 10px; border: 1px solid var(--accent-color); padding: 15px; background: #0a120a;" class="hidden">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <strong id="quick-result-relation" style="color: var(--accent-color); font-size: 18px;"></strong>
                    <span id="quick-result-score" style="font-size: 24px; font-weight: bold;"></span>
                </div>
                <p id="quick-result-desc" style="font-size: 13px; line-height: 1.5; color: #ccc; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #333;"></p>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <h3 id="ui-history-title">診断履歴</h3>
            <div id="history-list"></div>
            <button class="btn btn-danger hidden" id="btn-clear-history" onclick="clearHistory()">履歴を削除</button>
        </div>
    </div>

    <div id="screen-quiz" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">

        <div class="options" id="quiz-options"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn" onclick="prevQuestion()" id="btn-prev" style="width:30%;">戻る</button>
            <button class="btn" onclick="nextQuestion()" id="btn-next" style="width:70%;">次へ</button>

    <div id="screen-result" class="hidden">

            <div style="width: 100px; height: 100px; border: 2px solid #fff; display: inline-block; line-height:100px; color:#555;">[IMG]</div>
        </div>
        <div style="margin-bottom: 20px;">
            <div class="stat-row"><div class="stat-label">H</div><div class="stat-bar-container"><div id="bar-h" class="stat-bar"></div></div></div>
            <div class="stat-row"><div class="stat-label">E</div><div class="stat-bar-container"><div id="bar-e" class="stat-bar"></div></div></div>
            <div class="stat-row"><div class="stat-label">R</div><div class="stat-bar-container"><div id="bar-r" class="stat-bar"></div></div></div>

        <p id="result-profile" style="font-size: 14px; line-height: 1.6;"></p>
        <div style="border:1px solid #fff; padding:10px; margin-top:20px;">
            <strong id="ui-action-plan"></strong><br><span id="result-action"></span>

        <div style="border:1px dashed #fff; padding:10px; margin-top:20px;">

        <div id="help-list" style="margin-top: 20px; max-height: 400px; overflow-y: auto; border: 1px solid #444; padding: 15px; background: #111;"></div>

<script src="./data.js"></script>

<script>
 // ==========================================
// 1. 状態管理（State）
// ==========================================
const appState = {
    lang: 'ja',
    screen: 'home', 
    tier: 1,
    questions: [],
    currentIdx: 0,
    answers: {},
    history: JSON.parse(localStorage.getItem('hero_history')) || [],
    affinityA: Object.keys(heroData.types)[0],
    affinityB: Object.keys(heroData.types)[0],
    affinityResult: null,
    shareText: ""
};

// ==========================================
// 2. 状態更新エンジン
// ==========================================
function setState(updates) {
    Object.assign(appState, updates);
    render();
}

// ==========================================
// 3. メインレンダラー
// ==========================================
function render() {
    ['home', 'quiz', 'result', 'help'].forEach(screen => {
        document.getElementById(`screen-${screen}`).classList.toggle('hidden', appState.screen !== screen);
    });

    document.getElementById('btn-help').innerText = appState.lang === 'ja' ? "[ ? ] HELP" : "[ ? ] HELP";
    
    switch (appState.screen) {
        case 'home':   renderHome();   break;
        case 'quiz':   renderQuiz();   break;
        case 'result': renderResult(); break;
        case 'help':   renderHelp();   break;
    }
}

// ==========================================
// 4. 個別レンダリング関数
// ==========================================
function renderHome() {
    const isJa = appState.lang === 'ja';
    document.getElementById('ui-desc').innerText = isJa ? "心理的資本(HERO)に基づくステータス診断" : "Resilience Assessment based on HERO";
    document.getElementById('btn-tier1').innerText = isJa ? "軽く (12問)" : "Light (12 Qs)";
    document.getElementById('btn-tier2').innerText = isJa ? "普通に (28問)" : "Normal (28 Qs)";
    document.getElementById('btn-tier3').innerText = isJa ? "深く (48問)" : "Deep (48 Qs)";
    document.getElementById('ui-quick-affinity-title').innerText = isJa ? "簡易相性チェック" : "Quick Affinity Check";
    document.getElementById('ui-quick-affinity-desc').innerText = isJa ? "2つのタイプを選んで相性をシミュレーション" : "Select two types to simulate affinity";
    document.getElementById('btn-check-affinity').innerText = isJa ? "相性を見る" : "Check Affinity";
    document.getElementById('ui-history-title').innerText = isJa ? "診断履歴" : "History";
    document.getElementById('btn-clear-history').innerText = isJa ? "履歴を削除" : "Clear History";

    renderAffinityDropdowns();
    renderQuickAffinityResult();
    renderHistory();
}

function renderAffinityDropdowns() {
    const selectA = document.getElementById('affinity-type-a');
    const selectB = document.getElementById('affinity-type-b');
    
    if (selectA.options.length === 0) {
        for (const [key, data] of Object.entries(heroData.types)) {
            selectA.add(new Option(`[${key}] ${data.title[appState.lang]}`, key));
            selectB.add(new Option(`[${key}] ${data.title[appState.lang]}`, key));
        }
        selectA.addEventListener('change', (e) => setState({ affinityA: e.target.value, affinityResult: null }));
        selectB.addEventListener('change', (e) => setState({ affinityB: e.target.value, affinityResult: null }));
    } else {
        for (let i = 0; i < selectA.options.length; i++) {
            const key = selectA.options[i].value;
            const text = `[${key}] ${heroData.types[key].title[appState.lang]}`;
            selectA.options[i].text = text;
            selectB.options[i].text = text;
        }
    }
    selectA.value = appState.affinityA;
    selectB.value = appState.affinityB;
}

function renderQuickAffinityResult() {
    const resultDiv = document.getElementById('quick-affinity-result');
    if (appState.affinityResult) {
        resultDiv.classList.remove('hidden');
        document.getElementById('quick-result-relation').innerText = appState.affinityResult.relation;
        document.getElementById('quick-result-score').innerText = `${appState.affinityResult.score}%`;
        // 追加実装：詳細な解説テキストの描画
        document.getElementById('quick-result-desc').innerText = appState.affinityResult.desc;
    } else {
        resultDiv.classList.add('hidden');
    }
}

function renderHistory() {
    const historyList = document.getElementById('history-list');
    const clearBtn = document.getElementById('btn-clear-history');
    historyList.innerHTML = '';
    
    if (appState.history.length === 0) {
        historyList.innerHTML = `<p style="color:#555; font-size:14px;">${appState.lang === 'ja' ? '履歴はありません' : 'No history yet'}</p>`;
        clearBtn.classList.add('hidden');
        return;
    }
    
    clearBtn.classList.remove('hidden');

    const detailText = appState.lang === 'ja' ? "詳細を見る" : "Details";

    appState.history.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'history-item';
        // 追加実装：履歴クリック時に結果画面を復元する
        div.style.cursor = 'pointer';
        div.onclick = () => loadResultFromHistory(index);
        
        const titleStr = heroData.types[item.type] ? heroData.types[item.type].title[appState.lang] : item.title;
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span>[${item.date}] Tier${item.tier} : [${item.type}] ${titleStr}</span>
                <span style="color:var(--accent-color); font-size:12px; border:1px solid var(--accent-color); padding:2px 5px;">${detailText}</span>
            </div>
        `;
        historyList.appendChild(div);
    });
}

function renderQuiz() {
    const q = appState.questions[appState.currentIdx];
    if (!q) return;

    document.getElementById('quiz-progress').innerText = `Q. ${appState.currentIdx + 1} / ${appState.questions.length}`;
    document.getElementById('question-text').innerText = q.text[appState.lang];
    
    const optionsContainer = document.getElementById('quiz-options');
    optionsContainer.innerHTML = '';
    
    heroData.app_config.scale.forEach(scale => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        if (appState.answers[q.id] === scale.value) btn.classList.add('selected');
        btn.innerText = scale.label[appState.lang];
        btn.onclick = () => handleAnswer(q.id, scale.value);
        optionsContainer.appendChild(btn);
    });

    const isJa = appState.lang === 'ja';
    document.getElementById('btn-prev').disabled = appState.currentIdx === 0;
    document.getElementById('btn-prev').innerText = isJa ? "戻る" : "Back";
    document.getElementById('btn-next').innerText = appState.currentIdx === appState.questions.length - 1 
        ? (isJa ? "結果を見る" : "See Result") 
        : (isJa ? "次へ" : "Next");
}

function renderResult() {
    const isJa = appState.lang === 'ja';
    document.getElementById('ui-action-plan').innerText = isJa ? "【行動指針】" : "[ Action Plan ]";
    document.getElementById('ui-affinity').innerText = isJa ? "【全16タイプ 相性マトリックス】" : "[ 16-Type Affinity Matrix ]";
    if(document.getElementById('btn-share-x')) document.getElementById('btn-share-x').innerText = isJa ? "𝕏 で結果をシェア" : "Share on 𝕏";
    document.getElementById('btn-home').innerText = isJa ? "ホームに戻る" : "Back to Home";
}

function renderHelp() {
    const isJa = appState.lang === 'ja';
    document.getElementById('ui-help-title').innerText = isJa ? "16タイプ図鑑" : "16 Types Encyclopedia";
    document.getElementById('ui-help-desc').innerText = isJa ? "心理的資本(HERO)の組み合わせによる全クラス一覧" : "All classes based on HERO combinations";
    document.getElementById('btn-close-help').innerText = isJa ? "閉じる" : "Close";
    
    const helpList = document.getElementById('help-list');
    helpList.innerHTML = '';

    // ==========================================
    // 追加実装：PWAインストールの案内ブロック
    // ==========================================
    const pwaDiv = document.createElement('div');
    pwaDiv.style.borderBottom = "2px solid var(--accent-color)"; // 図鑑との区切りを明確にするため実線を使用
    pwaDiv.style.paddingBottom = "15px";
    pwaDiv.style.marginBottom = "20px";
    pwaDiv.innerHTML = `
        <div style="color: var(--accent-color); font-size: 16px; font-weight: bold; margin-bottom: 8px;">
            ${isJa ? "[ App Install ] アプリのインストールについて" : "[ App Install ] About PWA Installation"}
        </div>
        <div style="font-size: 13px; line-height: 1.6; color: #eee;">
            ${isJa
                ? "当アプリはPWA（プログレッシブ・ウェブ・アプリ）に対応しています。<br>スマートフォンのブラウザメニューから「ホーム画面に追加」を選択するか、PCブラウザのアドレスバー右側から「インストール」を行うことで、ネイティブアプリのように全画面で快適にご利用いただけます。<br><span style='color:#aaa; font-size:11px;'>※オフライン環境での動作や、キャッシュによる高速起動にも対応しています。</span>"
                : "This application supports PWA (Progressive Web App).<br>By selecting 'Add to Home Screen' from your mobile browser menu, or clicking 'Install' in your PC browser's address bar, you can use it in full-screen mode like a native app.<br><span style='color:#aaa; font-size:11px;'>* It also features offline support and fast loading via cache.</span>"
            }
        </div>
    `;
    helpList.appendChild(pwaDiv);
    // ==========================================

    // 既存の16タイプ図鑑の生成ループ
    for (const [key, data] of Object.entries(heroData.types)) {
        const div = document.createElement('div');
        div.style.borderBottom = "1px dashed #555"; div.style.paddingBottom = "15px"; div.style.marginBottom = "15px";
        div.innerHTML = `<div style="color: var(--accent-color); font-size: 16px; font-weight: bold; margin-bottom: 5px;">[${key}] ${data.title[appState.lang]}</div>
                         <div style="font-size: 13px; line-height: 1.5; color: #ccc;">${data.profile[appState.lang]}</div>`;
        helpList.appendChild(div);
    }
}

// ==========================================
// 5. アクションハンドラ（ロジック）
// ==========================================
document.getElementById('lang-toggle').addEventListener('click', () => {
    setState({ lang: appState.lang === 'ja' ? 'en' : 'ja' });
});

function showHelp() { setState({ screen: 'help' }); }
function closeHelp() { setState({ screen: 'home' }); }
function goHome() { setState({ screen: 'home', affinityResult: null }); }

// 追加実装：診断の中断
function abortQuiz() {
    if(confirm(appState.lang === 'ja' ? '診断を中止してホームに戻りますか？' : 'Abort the assessment and return to Home?')) {
        setState({ screen: 'home' });
    }
}

function startQuiz(tier) {
    setState({
        screen: 'quiz',
        tier: tier,
        questions: heroData.questions.filter(q => q.tier <= tier),
        currentIdx: 0,
        answers: {}
    });
}

function handleAnswer(qId, value) {
    const newAnswers = { ...appState.answers, [qId]: value };
    setState({ answers: newAnswers });
}

function prevQuestion() {
    if (appState.currentIdx > 0) setState({ currentIdx: appState.currentIdx - 1 });
}

function nextQuestion() {
    const qId = appState.questions[appState.currentIdx].id;
    if (!appState.answers[qId]) {
        alert(appState.lang === 'ja' ? '回答を選択してください' : 'Please select an option');
        return;
    }
    if (appState.currentIdx < appState.questions.length - 1) {
        setState({ currentIdx: appState.currentIdx + 1 });
    } else {
        calculateAndSaveResult();
    }
}

// 新規分離：結果の計算と保存を専任する関数
function calculateAndSaveResult() {
    let scores = { H: 0, E: 0, R: 0, O: 0 }, counts = { H: 0, E: 0, R: 0, O: 0 };
    appState.questions.forEach(q => {
        let val = appState.answers[q.id];
        if (q.is_reversed) val = 6 - val;
        scores[q.category] += val;
        counts[q.category] += 1;
    });

    let typeStr = "", percentages = {};
    ['H', 'E', 'R', 'O'].forEach(cat => {
        let avg = scores[cat] / counts[cat];
        typeStr += avg >= 3.0 ? "H" : "L";
        percentages[cat] = ((avg - 1) / 4) * 100;
    });

    const resultData = heroData.types[typeStr] || heroData.types[Object.keys(heroData.types)[0]];
    const titleStr = resultData.title[appState.lang];
    
    // 追加実装：パーセンテージデータも履歴に保存する
    const date = new Date();
    const dateStr = `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
    const newHistory = [{ date: dateStr, type: typeStr, title: titleStr, tier: appState.tier, percentages: percentages }, ...appState.history];
    localStorage.setItem('hero_history', JSON.stringify(newHistory));
    
    setState({ history: newHistory });

    displayResultScreen(typeStr, percentages);
}

// 新規追加：履歴クリックから呼び出される復元用関数
function loadResultFromHistory(index) {
    const item = appState.history[index];
    
    // 古い仕様の履歴（パーセンテージデータがない場合）への安全策
    let percs = item.percentages;
    if (!percs) {
        percs = {
            H: item.type[0] === 'H' ? 80 : 20,
            E: item.type[1] === 'H' ? 80 : 20,
            R: item.type[2] === 'H' ? 80 : 20,
            O: item.type[3] === 'H' ? 80 : 20
        };
    }
    
    displayResultScreen(item.type, percs);
}

// 新規分離：画面に結果を描画することだけを専任する関数
function displayResultScreen(typeStr, percentages) {
    const resultData = heroData.types[typeStr] || heroData.types[Object.keys(heroData.types)[0]];
    const titleStr = resultData.title[appState.lang];
    
    const text = appState.lang === 'ja' 
        ? `私のステータスは [ ${typeStr} ] ${titleStr} でした！\n\n`
        : `My HERO status is [ ${typeStr} ] ${titleStr}!\n\n`;

    document.getElementById('result-type').innerText = `[ ${typeStr} ]`;
    document.getElementById('result-title').innerText = titleStr;
    document.getElementById('result-profile').innerText = resultData.profile[appState.lang];
    document.getElementById('result-action').innerText = resultData.action_plan[appState.lang];
    
    const imgContainer = document.querySelector('#screen-result div[style*="text-align: center"]');
    imgContainer.innerHTML = `<img src="assets/icons/${typeStr}.png" alt="${typeStr}" style="width:100px; height:100px; image-rendering: pixelated;">`;

    ['h', 'e', 'r', 'o'].forEach(cat => {
        document.getElementById(`bar-${cat}`).style.width = `${percentages[cat.toUpperCase()]}%`;
    });

    generateAffinityList(typeStr);
    setState({ screen: 'result', shareText: text });
}

function generateAffinityList(baseType) {
    const affinityListDiv = document.getElementById('affinity-list');
    affinityListDiv.innerHTML = '';
    let results = [];
    
    for (const [targetType, targetData] of Object.entries(heroData.types)) {
        const affData = calcLogic(baseType, targetType);
        results.push({ type: targetType, title: targetData.title[appState.lang], score: affData.score, relation: affData.relation });
    }
    
    results.sort((a, b) => b.score - a.score).forEach(item => {
        const div = document.createElement('div');
        div.className = 'affinity-item';
        div.innerHTML = `<div class="affinity-type">[${item.type}]</div><div class="affinity-title">${item.title}</div>
                         <div class="affinity-score-box"><span class="affinity-relation">${item.relation}</span><strong>${item.score}%</strong></div>`;
        affinityListDiv.appendChild(div);
    });
}

function checkQuickAffinity() {
    const resultData = calcLogic(appState.affinityA, appState.affinityB);
    setState({ affinityResult: resultData });
}

// 修正：相性ロジックに汎用解説テキスト（desc）を動的に追加
function calcLogic(typeA, typeB) {
    let diff = 0;
    for (let i = 0; i < 4; i++) { if (typeA[i] !== typeB[i]) diff++; }
    const isJa = appState.lang === 'ja';
    switch(diff) {
        case 4: return { 
            score: 120, 
            relation: isJa ? "究極の補完者" : "Ultimate Complement",
            desc: isJa ? "価値観や行動原理が完全に真逆だからこそ、互いの死角を完璧にカバーし合える最強のペアです。反発を乗り越えた時、最大のシナジーを生みます。" : "Completely opposite values allow you to perfectly cover each other's blind spots. Overcoming friction creates the greatest synergy."
        };
        case 1: return { 
            score: 90,  
            relation: isJa ? "最良の戦友" : "Best Comrade",
            desc: isJa ? "ベースとなる価値観を共有しつつ、一部の異なる視点が良い刺激となります。阿吽の呼吸でプロジェクトを進められる理想的な関係です。" : "Sharing core values while having slightly different perspectives provides good stimulation. An ideal relationship."
        };
        case 0: return { 
            score: 80,  
            relation: isJa ? "鏡面の同志" : "Mirror Comrade",
            desc: isJa ? "自分と同じ思考回路を持つため、共感度は圧倒的です。ただし、同じ弱点を持つため、予期せぬトラブル時には共倒れするリスクに注意が必要です。" : "Having the same thought process means overwhelming empathy. However, beware of mutually collapsing during unexpected troubles due to shared weaknesses."
        };
        case 2: return { 
            score: 60,  
            relation: isJa ? "平行線の協力者" : "Parallel Collaborator",
            desc: isJa ? "適度な共通点と相違点を持つ、ビジネスライクな関係。互いの領域を侵さず、役割分担を明確にすることで確実に成果を出せます。" : "A business-like relationship with moderate similarities and differences. Best handled by clarifying roles and not encroaching on each other."
        };
        case 3: return { 
            score: 40,  
            relation: isJa ? "異端の摩擦者" : "Unorthodox Friction",
            desc: isJa ? "理解できない行動が多く、ストレスを感じやすい関係。しかし、自分にない発想をもたらす「劇薬」として割り切れば、突破口を開く鍵になります。" : "Often hard to understand and prone to causing stress. However, viewing them as a 'drastic medicine' bringing new ideas can open breakthroughs."
        };
    }
}

function clearHistory() {
    if(confirm(appState.lang === 'ja' ? '本当に履歴を削除しますか？' : 'Are you sure to clear history?')) {
        localStorage.removeItem('hero_history');
        setState({ history: [] });
    }
}

function shareOnX() {
    const url = "https://wearehero.vercel.app/";
    const hashtags = "WEAREHERO,心理的資本";
    const intentUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(appState.shareText)}&url=${encodeURIComponent(url)}&hashtags=${hashtags}`;
    window.open(intentUrl, '_blank', 'noopener,noreferrer');
}

render();

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(err => console.log('SW error: ', err));
    });
}
